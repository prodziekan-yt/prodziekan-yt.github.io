---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">> {{ page.title }}</h1>
        <p class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                Data publikacji: {{ page.date | date: "%d.%m.%Y" }}
            </time>
        </p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-footer">
        <a href="{{ "/blog" | relative_url }}"><- Wróć do listy wpisów</a>
    </div>
</article>
